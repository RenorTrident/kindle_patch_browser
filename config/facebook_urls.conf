# Facebook URLs for Kindle Oasis 3
# Optimized versions for low-bandwidth devices

FACEBOOK_LITE=https://mbasic.facebook.com
FACEBOOK_MOBILE=https://m.facebook.com
FACEBOOK_TOUCH=https://touch.facebook.com
FACEBOOK_WWW=https://www.facebook.com

# Default version (recommended for Kindle)
FACEBOOK_DEFAULT=lite

# Cache and Cookie settings
CACHE_DIR=/mnt/us/.facebook_browser/cache
COOKIE_DIR=/mnt/us/.facebook_browser/cookies
LOG_DIR=/var/log

# Connection settings
TIMEOUT=30
VERIFY_SSL=true
