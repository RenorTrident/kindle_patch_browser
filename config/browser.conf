# Browser Configuration for Kindle Oasis 3

# Facebook version: lite, mobile, touch, www
FACEBOOK_VERSION=lite

# User Agent
USER_AGENT=Mozilla/5.0 (Mobile; rv:14.0) Gecko/14.0 Firefox/14.0

# Security
VERIFY_SSL=true
REQUEST_TIMEOUT=30

# Performance
CACHE_ENABLED=true
CACHE_SIZE_MB=50
JAVASCRIPT_ENABLED=false
IMAGES_ENABLED=true
AUTO_PLAY_VIDEO=false

# Display
SCREEN_WIDTH=1680
SCREEN_HEIGHT=1264
FONT_SIZE=medium

# Cookies
COOKIES_ENABLED=true
COOKIE_EXPIRY=30
